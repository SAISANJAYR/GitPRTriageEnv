<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PR Review RL Agent – Results Dashboard</title>
  <meta name="description" content="GRPO training results for the PR Regression Audit RL agent. Compare baseline vs V1 vs V2 trained models across easy, medium, and hard difficulty levels."/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- React & ReactDOM (pinned) -->
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

  <!-- Babel for in-browser JSX transpilation -->
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.0/babel.min.js"></script>

  <!-- Recharts dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
  <!-- Recharts UMD bundle (pinned) -->
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>

  <style>
    :root {
      --bg-main: #0B0E14;
      --bg-card: #131722;
      --bg-input: #1C2130;
      --border-color: #2A3143;
      --text-main: #E2E8F0;
      --text-muted: #94A3B8;
      
      --color-baseline: #6366f1;
      --color-v1: #f59e0b;
      --color-v2: #10b981;
      
      --color-easy: #3b82f6;
      --color-medium: #8b5cf6;
      --color-hard: #ec4899;
      
      --radius: 12px;
    }

    body { margin: 0; padding: 0; background-color: var(--bg-main); color: var(--text-main); font-family: 'Inter', system-ui, sans-serif; line-height: 1.5; }
    * { box-sizing: border-box; }
    
    .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
    
    .card { 
      background: var(--bg-card); 
      border: 1px solid var(--border-color); 
      border-radius: var(--radius); 
      padding: 1.5rem; 
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    
    .textarea { width: 100%; height: 140px; background: var(--bg-input); color: var(--text-muted); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px 12px; font-family: 'Courier New', monospace; font-size: 12px; resize: vertical; margin-top: 8px; transition: border-color 0.2s; }
    .textarea:focus { outline: none; border-color: var(--color-v2); color: var(--text-main); }
    
    .badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .tag-online  { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
    .tag-offline { background: rgba(248, 113, 113, 0.15); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.3); }
    .tag-info { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
    
    .tag-baseline { background: rgba(99, 102, 241, 0.15); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.3); }
    .tag-v1      { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
    .tag-v2      { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }

    .metric-val  { font-size: 2.5rem; font-weight: 700; letter-spacing: -1px; line-height: 1.2; }
    .positive { color: #34d399; }
    .negative { color: #f87171; }
    
    h1 { margin: 0 0 0.5rem; font-size: 2.25rem; font-weight: 700; letter-spacing: -0.02em; }
    h2 { margin: 0 0 1rem; font-size: 1.25rem; font-weight: 600; color: var(--text-muted); }
    h3 { margin: 0 0 0.5rem; font-size: 1.1rem; font-weight: 600; color: var(--text-main); }
    p { margin: 0 0 1rem; color: var(--text-muted); }
    
    label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .section-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 700; margin: 3rem 0 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border-color); }
    
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 12px 16px; color: var(--text-muted); font-weight: 600; border-bottom: 2px solid var(--border-color); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
    td { padding: 16px; border-bottom: 1px solid var(--border-color); }
    tr:last-child td { border-bottom: none; }
    
    .info-list { list-style: none; padding: 0; margin: 0; }
    .info-list li { margin-bottom: 0.75rem; display: flex; align-items: flex-start; gap: 0.5rem; }
    .info-list strong { color: var(--text-main); min-width: 140px; display: inline-block; }
    
    .btn-toggle { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border-color); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 500; font-family: inherit; font-size: 0.875rem; transition: background 0.2s; }
    .btn-toggle:hover { background: var(--border-color); }
    
    @media (max-width: 1024px) { .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 768px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="error-log" style="color: #f87171; padding: 20px; font-family: monospace; white-space: pre-wrap; display:none;"></div>
  <div id="root"></div>

  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      var el = document.getElementById('error-log');
      el.style.display = 'block';
      el.innerText += "\nGlobal Error: " + message + "\n" + (error ? error.stack : '');
    };
    window.addEventListener('unhandledrejection', function(event) {
      var el = document.getElementById('error-log');
      el.style.display = 'block';
      el.innerText += "\nPromise Error: " + event.reason;
    });
  </script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const {
      BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
      ResponsiveContainer, LineChart, Line, ReferenceLine
    } = window.Recharts || {};

    // ── INITIAL DATA CONSTANTS ──────────────────────────────────────────────
    const INITIAL_BASELINE = {
      easy:   { avg: 0.3597, std: 0.2994, n: 107 },
      medium: { avg: 0.1733, std: 0.1702, n: 26  },
      hard:   { avg: 0.1824, std: 0.121,  n: 17  }
    };

    const INITIAL_V1 = {
      easy:   { avg: 0.3098, std: 0.3225, n: 47 },
      medium: { avg: 0.0382, std: 0.069,  n: 8  },
      hard:   { avg: 0.0181, std: 0.0299, n: 5  }
    };

    const INITIAL_V2 = {
      easy:   { avg: 0.0, std: 0.0, n: 0 },
      medium: { avg: 0.0, std: 0.0, n: 0 },
      hard:   { avg: 0.0, std: 0.0, n: 0 }
    };

    const LEVELS = ['easy', 'medium', 'hard'];

    // ── HELPER FUNCTION FOR MOVING AVERAGE ──────────────────────────────────
    function computeMovingAverage(data, windowSize = 20) {
      let result = [];
      let easys = [], mediums = [], hards = [];
      
      data.forEach((entry, i) => {
        if (entry.level === 'easy') easys.push(entry.reward);
        if (entry.level === 'medium') mediums.push(entry.reward);
        if (entry.level === 'hard') hards.push(entry.reward);
        
        const getAvg = (arr) => {
          if (arr.length === 0) return null;
          const slice = arr.slice(-windowSize);
          return slice.reduce((a, b) => a + b, 0) / slice.length;
        };

        if (i % 5 === 0 || i === data.length - 1) { // Downsample points slightly for performance
           result.push({
             episode: entry.episode,
             easy: getAvg(easys),
             medium: getAvg(mediums),
             hard: getAvg(hards)
           });
        }
      });
      return result;
    }

    function ResultsDashboard() {
      // Config State
      const [showConfig, setShowConfig] = useState(false);
      const [baselineStr, setBaselineStr] = useState(JSON.stringify(INITIAL_BASELINE, null, 2));
      const [v1Str,       setV1Str]       = useState(JSON.stringify(INITIAL_V1,       null, 2));
      const [v2Str,       setV2Str]       = useState(JSON.stringify(INITIAL_V2,       null, 2));
      
      // Live Data State
      const [envHealth,   setEnvHealth]   = useState(null);
      const [auditData,   setAuditData]   = useState([]);
      const [curriculumStats, setCurriculumStats] = useState(null);

      // Fetch Live Data
      useEffect(() => {
        const fetchAll = () => {
          // Health
          fetch('/health').then(r => r.json()).then(d => setEnvHealth(d.status)).catch(() => setEnvHealth('disconnected'));
          // Audit Log (Full Training Curve)
          fetch('/audit?n=10000').then(r => r.json()).then(d => {
             if(Array.isArray(d)) setAuditData(d);
          }).catch(console.error);
          // Curriculum Stats
          fetch('/curriculum').then(r => r.json()).then(d => setCurriculumStats(d)).catch(console.error);
        };
        
        fetchAll();
        const interval = setInterval(fetchAll, 10000); // Poll every 10s
        return () => clearInterval(interval);
      }, []);

      // Parsing Config Data
      let baseline = INITIAL_BASELINE, v1 = INITIAL_V1, v2 = INITIAL_V2;
      try { baseline = JSON.parse(baselineStr); } catch {}
      try { v1       = JSON.parse(v1Str);       } catch {}
      try { v2       = JSON.parse(v2Str);       } catch {}
      
      // If V2 is still 0, we can try to auto-populate from curriculum stats if they have recent performance
      if (curriculumStats && curriculumStats.recent_performance && (v2.easy.n === 0)) {
         v2.easy.avg = curriculumStats.recent_performance.easy || 0;
         v2.medium.avg = curriculumStats.recent_performance.medium || 0;
         v2.hard.avg = curriculumStats.recent_performance.hard || 0;
      }

      // Compute Comparison Data
      const comparisonData = LEVELS.map(level => {
        const b  = baseline[level] || { avg: 0 };
        const t1 = v1[level]       || { avg: 0 };
        const t2 = v2[level]       || { avg: 0 };
        return {
          name:             level.charAt(0).toUpperCase() + level.slice(1),
          Baseline:         +(b.avg.toFixed(4)),
          'V1 (200 steps)': +(t1.avg.toFixed(4)),
          'V2 (400 steps)': +(t2.avg.toFixed(4)),
          deltaV1:          +(t1.avg - b.avg).toFixed(4),
          deltaV2:          +(t2.avg - b.avg).toFixed(4),
          pctV1:  b.avg > 0 ? +((t1.avg - b.avg) / b.avg * 100).toFixed(1) : 0,
          pctV2:  b.avg > 0 ? +((t2.avg - b.avg) / b.avg * 100).toFixed(1) : 0,
        };
      });

      const v2Ready = LEVELS.some(l => (v2[l]?.n || 0) > 0) || (curriculumStats?.total_episodes_recorded > 0);
      const curveData = useMemo(() => computeMovingAverage(auditData, 20), [auditData]);

      return (
        <div className="container">

          {/* ── HEADER & SYNOPSIS ────────────────────────────────────────── */}
          <div style={{ marginBottom: '3rem' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', marginBottom: '1rem', flexWrap: 'wrap' }}>
              <h1>GitPRTriage: RL for PR Review</h1>
              {envHealth === 'healthy'      ? <span className="badge tag-online">● ENV Online</span> :
               envHealth === 'disconnected' ? <span className="badge tag-offline">● ENV Offline</span> : null}
              <span className="badge tag-info">Meta × Scaler OpenEnv Hackathon 2026</span>
            </div>
            
            <p style={{ fontSize: '1.1rem', maxWidth: '900px' }}>
              This project trains a Reinforcement Learning agent to autonomously review GitHub Pull Requests, identify regressions, and suggest precise code fixes. Using the PRRegressionAudit custom environment, the agent is trained across three varying difficulties (Safety Gate, Defect Locator, and Full Integration Audit).
            </p>
          </div>

          {/* ── MODEL DETAILS ────────────────────────────────────────────── */}
          <div className="section-title">
            <span>Model Details & Training Parameters</span>
          </div>
          <div className="grid-2" style={{ marginBottom: '2rem' }}>
            <div className="card">
              <h3>Architecture</h3>
              <ul className="info-list">
                <li><strong>Base Model:</strong> <span>Qwen2.5-1.5B-Instruct</span></li>
                <li><strong>RL Algorithm:</strong> <span>GRPO (Group Relative Policy Optimization)</span></li>
                <li><strong>Frameworks:</strong> <span>Unsloth + TRL (Hugging Face)</span></li>
                <li><strong>Environment:</strong> <span>Custom PRRegressionAudit API</span></li>
              </ul>
            </div>
            <div className="card">
              <h3>Training Stages</h3>
              <ul className="info-list">
                <li><strong style={{color: 'var(--color-baseline)'}}>Baseline:</strong> <span>Random actions used as benchmark metrics.</span></li>
                <li><strong style={{color: 'var(--color-v1)'}}>V1 (Initial):</strong> <span>200 GRPO steps on an L4 GPU. No curriculum.</span></li>
                <li><strong style={{color: 'var(--color-v2)'}}>V2 (Advanced):</strong> <span>400 GRPO steps on an A100 GPU utilizing dynamic <strong>Curriculum Learning</strong> and Anti-Reward Hacking Guards.</span></li>
              </ul>
            </div>
          </div>

          {/* ── LIVE TRAINING CURVE ──────────────────────────────────────── */}
          {auditData.length > 0 && (
            <div style={{ marginBottom: '3rem' }}>
              <div className="section-title">
                <span>Live Training Progress (Reward Curve)</span>
                {curriculumStats && <span className="badge tag-v2" style={{ marginLeft: '1rem' }}>Phase: {curriculumStats.current_phase.toUpperCase()}</span>}
              </div>
              <div className="card">
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                  <p style={{ margin: 0, fontSize: '0.9rem' }}>Moving Average of Rewards (Window: 20 episodes). Total Episodes: {auditData.length}</p>
                </div>
                <div style={{ height: 400, width: '100%' }}>
                  <ResponsiveContainer>
                    <LineChart data={curveData} margin={{ top: 10, right: 30, left: 0, bottom: 10 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke="var(--border-color)" vertical={false} />
                      <XAxis dataKey="episode" stroke="var(--text-muted)" tick={{fill: 'var(--text-muted)', fontSize: 12}} tickLine={false} axisLine={false} />
                      <YAxis stroke="var(--text-muted)" domain={[0, 1]} tick={{fill: 'var(--text-muted)', fontSize: 12}} tickLine={false} axisLine={false} />
                      <Tooltip
                        contentStyle={{ backgroundColor: 'var(--bg-card)', border: '1px solid var(--border-color)', borderRadius: 8, color: 'var(--text-main)' }}
                        formatter={(val) => val ? val.toFixed(3) : 'N/A'}
                        labelFormatter={(label) => `Episode ${label}`}
                      />
                      <Legend wrapperStyle={{ paddingTop: 20 }} />
                      <Line type="monotone" dataKey="easy" name="Easy Reward" stroke="var(--color-easy)" strokeWidth={2} dot={false} connectNulls />
                      <Line type="monotone" dataKey="medium" name="Medium Reward" stroke="var(--color-medium)" strokeWidth={2} dot={false} connectNulls />
                      <Line type="monotone" dataKey="hard" name="Hard Reward" stroke="var(--color-hard)" strokeWidth={2} dot={false} connectNulls />
                    </LineChart>
                  </ResponsiveContainer>
                </div>
              </div>
            </div>
          )}

          {/* ── COMPARISON DASHBOARD ─────────────────────────────────────── */}
          <div className="section-title">
            <span>Model Evaluation & Comparison</span>
          </div>

          <div style={{ marginBottom: '1.5rem', textAlign: 'right' }}>
            <button className="btn-toggle" onClick={() => setShowConfig(!showConfig)}>
              {showConfig ? 'Hide Config JSON' : 'Edit Comparison Data (JSON)'}
            </button>
          </div>

          {/* Live Data Config - Collapsible */}
          {showConfig && (
            <div className="card" style={{ marginBottom: '2rem' }}>
              <p style={{ marginTop: 0, fontWeight: 600, color: 'var(--text-main)' }}>Data Config</p>
              <div className="grid-3">
                <div>
                  <label>Baseline JSON</label>
                  <textarea className="textarea" value={baselineStr} onChange={e => setBaselineStr(e.target.value)} />
                </div>
                <div>
                  <label>V1 JSON (200 steps)</label>
                  <textarea className="textarea" value={v1Str} onChange={e => setV1Str(e.target.value)} />
                </div>
                <div>
                  <label>V2 JSON (400 steps)</label>
                  <textarea className="textarea" value={v2Str} onChange={e => setV2Str(e.target.value)} />
                </div>
              </div>
            </div>
          )}

          {/* Metric Cards */}
          <div className="grid-3" style={{ marginBottom: '2rem' }}>
            {comparisonData.map(d => (
              <div className="card" key={d.name} style={{ textAlign: 'center' }}>
                <h3>{d.name} Difficulty</h3>
                <div className={`metric-val ${d.pctV1 >= 0 ? 'positive' : 'negative'}`}>
                  {d.pctV1 > 0 ? '+' : ''}{d.pctV1}%
                </div>
                <div style={{ color: 'var(--text-muted)', fontSize: '0.85rem', marginTop: '0.4rem' }}>
                  V1 Improvement over Baseline
                </div>
                {v2Ready && (
                  <div style={{ marginTop: '1.5rem', paddingTop: '1rem', borderTop: '1px solid var(--border-color)' }}>
                    <div style={{ fontSize: '1.5rem', fontWeight: 700, color: d.pctV2 >= 0 ? 'var(--color-v2)' : 'var(--negative)' }}>
                      {d.pctV2 > 0 ? '+' : ''}{d.pctV2}%
                    </div>
                    <div style={{ color: 'var(--text-muted)', fontSize: '0.85rem', marginTop: '0.2rem' }}>
                      V2 Improvement over Baseline
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* Charts */}
          <div className="grid-2" style={{ marginBottom: '2rem' }}>
            {/* Bar Chart */}
            <div className="card">
              <h3 style={{ marginBottom: '1.5rem', textAlign: 'center' }}>Absolute Scores</h3>
              <div style={{ height: 320 }}>
                <ResponsiveContainer>
                  <BarChart data={comparisonData} margin={{ top: 10, right: 10, left: -10, bottom: 0 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="var(--border-color)" vertical={false} />
                    <XAxis dataKey="name" stroke="var(--text-muted)" tickLine={false} axisLine={false} style={{ fontSize: 12 }} />
                    <YAxis stroke="var(--text-muted)" domain={[0, 0.6]} tickLine={false} axisLine={false} style={{ fontSize: 11 }} />
                    <Tooltip
                      cursor={{fill: 'rgba(255,255,255,0.05)'}}
                      contentStyle={{ backgroundColor: 'var(--bg-card)', border: '1px solid var(--border-color)', borderRadius: 8, color: 'var(--text-main)' }}
                      formatter={(v) => v.toFixed(4)}
                    />
                    <Legend wrapperStyle={{ paddingTop: 16, fontSize: 12 }} />
                    <Bar dataKey="Baseline"       fill="var(--color-baseline)" radius={[4,4,0,0]} maxBarSize={40} />
                    <Bar dataKey="V1 (200 steps)" fill="var(--color-v1)"       radius={[4,4,0,0]} maxBarSize={40} />
                    {v2Ready && <Bar dataKey="V2 (400 steps)" fill="var(--color-v2)" radius={[4,4,0,0]} maxBarSize={40} />}
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>

            {/* Line Chart */}
            <div className="card">
              <h3 style={{ marginBottom: '1.5rem', textAlign: 'center' }}>Score Delta (vs Baseline)</h3>
              <div style={{ height: 320 }}>
                <ResponsiveContainer>
                  <LineChart data={comparisonData} margin={{ top: 10, right: 20, left: -10, bottom: 0 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="var(--border-color)" vertical={false} />
                    <XAxis dataKey="name" stroke="var(--text-muted)" tickLine={false} axisLine={false} style={{ fontSize: 12 }} />
                    <YAxis stroke="var(--text-muted)" tickLine={false} axisLine={false} style={{ fontSize: 11 }} />
                    <ReferenceLine y={0} stroke="var(--text-muted)" strokeDasharray="4 4" />
                    <Tooltip
                      contentStyle={{ backgroundColor: 'var(--bg-card)', border: '1px solid var(--border-color)', borderRadius: 8, color: 'var(--text-main)' }}
                      formatter={(v) => v.toFixed(4)}
                    />
                    <Legend wrapperStyle={{ paddingTop: 16, fontSize: 12 }} />
                    <Line type="monotone" dataKey="deltaV1" name="V1 Delta" stroke="var(--color-v1)" strokeWidth={3} dot={{ r: 5, fill: 'var(--bg-card)', strokeWidth: 2 }} />
                    {v2Ready && <Line type="monotone" dataKey="deltaV2" name="V2 Delta" stroke="var(--color-v2)" strokeWidth={3} dot={{ r: 5, fill: 'var(--bg-card)', strokeWidth: 2 }} />}
                  </LineChart>
                </ResponsiveContainer>
              </div>
            </div>
          </div>

          {/* Full Results Table */}
          <div className="card">
            <h3>Full Results Data</h3>
            <div style={{ overflowX: 'auto', marginTop: '1rem' }}>
              <table>
                <thead>
                  <tr>
                    {['Difficulty', 'Baseline', 'V1 Mean', 'V1 Δ', 'V1 %',
                      ...(v2Ready ? ['V2 Mean', 'V2 Δ', 'V2 %'] : [])
                    ].map(h => <th key={h}>{h}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {comparisonData.map(d => (
                    <tr key={d.name}>
                      <td style={{ fontWeight: 600, color: 'var(--text-main)' }}>{d.name}</td>
                      <td style={{ color: 'var(--color-baseline)' }}>{d.Baseline.toFixed(4)}</td>
                      <td style={{ color: 'var(--color-v1)' }}>{d['V1 (200 steps)'].toFixed(4)}</td>
                      <td className={d.deltaV1 >= 0 ? 'positive' : 'negative'}>{d.deltaV1 > 0 ? '+' : ''}{d.deltaV1.toFixed(4)}</td>
                      <td className={d.pctV1  >= 0 ? 'positive' : 'negative'}>{d.pctV1  > 0 ? '+' : ''}{d.pctV1}%</td>
                      {v2Ready && <td style={{ color: 'var(--color-v2)', fontWeight: 500 }}>{d['V2 (400 steps)'].toFixed(4)}</td>}
                      {v2Ready && <td className={d.deltaV2 >= 0 ? 'positive' : 'negative'} style={{fontWeight: 500}}>{d.deltaV2 > 0 ? '+' : ''}{d.deltaV2.toFixed(4)}</td>}
                      {v2Ready && <td className={d.pctV2  >= 0 ? 'positive' : 'negative'} style={{fontWeight: 500}}>{d.pctV2  > 0 ? '+' : ''}{d.pctV2}%</td>}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
